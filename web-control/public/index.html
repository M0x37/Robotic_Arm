<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Arm Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Geist:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-inner">
        <div class="topbar-left">
          <span class="logo-dot"></span>
          <h1 class="logo-text">ROBOT ARM</h1>
        </div>
        <div class="topbar-right">
          <span class="status-pill" id="statusPill">
            <span class="status-led" id="statusLed"></span>
            <span id="statusLabel">OFF</span>
          </span>
        </div>
      </div>
    </header>

    <main class="main">

      <!-- Connection -->
      <section class="bento-card connection-card">
        <div class="card-header">
          <span class="card-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="2" y="14" width="20" height="8" rx="2" ry="2"/><path d="M6 6h.01M6 18h.01"/></svg>
          </span>
          <h2 class="card-title">Link</h2>
        </div>
        <div class="connection-row">
          <select id="portSelect" class="select" data-testid="port-select">
            <option value="">-- Port --</option>
          </select>
          <input type="number" id="baudRate" class="input input-narrow" value="115200" data-testid="baud-input">
          <button id="refreshPorts" class="btn btn-ghost btn-sm" data-testid="refresh-ports">Scan</button>
          <button id="connectBtn" class="btn btn-primary" data-testid="connect-btn">Connect</button>
          <button id="disconnectBtn" class="btn btn-secondary" data-testid="disconnect-btn" disabled>Kill</button>
        </div>
      </section>

      <!-- Bento Grid -->
      <div class="bento-grid">

        <section class="bento-card">
          <div class="card-header">
            <span class="card-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </span>
            <h2 class="card-title">Servos</h2>
          </div>

          <div class="param-group">
            <label class="param-label">Basis</label>
            <div class="param-row">
              <input type="number" id="basisVal" class="input" value="90" min="0" max="180">
              <button class="btn btn-pill cmd-btn" data-cmd="basis" data-testid="cmd-basis">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </button>
            </div>

            <label class="param-label">Gelenk 1</label>
            <div class="param-row">
              <input type="number" id="gelenk1Val" class="input" value="160" min="90" max="190">
              <button class="btn btn-pill cmd-btn" data-cmd="gelenk1" data-testid="cmd-gelenk1">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </button>
            </div>

            <label class="param-label">Gelenk 2</label>
            <div class="param-row">
              <input type="number" id="gelenk2Val" class="input" value="0" min="0" max="180">
              <button class="btn btn-pill cmd-btn" data-cmd="gelenk2" data-testid="cmd-gelenk2">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </button>
            </div>

            <label class="param-label">Alle</label>
            <div class="param-row">
              <input type="number" id="allVal" class="input" value="90" min="0" max="180">
              <button class="btn btn-pill cmd-btn" data-cmd="all" data-testid="cmd-all">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
              </button>
            </div>
          </div>
        </section>

        <section class="bento-card">
          <div class="card-header">
            <span class="card-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
            </span>
            <h2 class="card-title">Actions</h2>
          </div>

          <div class="action-block">
            <h3 class="block-label">Greifer</h3>
            <div class="pill-strip">
              <button class="btn btn-pill cmd-btn flex-1" data-cmd="auf" data-testid="cmd-auf">AUF</button>
              <button class="btn btn-pill cmd-btn flex-1" data-cmd="zu" data-testid="cmd-zu">ZU</button>
            </div>
          </div>

          <div class="action-block">
            <h3 class="block-label">Position</h3>
            <div class="pill-strip">
              <button class="btn btn-pill btn-accent cmd-btn flex-1" data-cmd="start" data-testid="cmd-start">Start</button>
              <button class="btn btn-pill cmd-btn flex-1" data-cmd="posi" data-testid="cmd-posi">Posi</button>
              <button class="btn btn-pill cmd-btn flex-1" data-cmd="undo" data-testid="cmd-undo">90°</button>
            </div>
          </div>

          <div class="action-block">
            <h3 class="block-label">System</h3>
            <div class="pill-strip">
              <button class="btn btn-pill cmd-btn flex-1" data-cmd="test" data-testid="cmd-test">Test</button>
              <button class="btn btn-pill cmd-btn flex-1" data-cmd="help" data-testid="cmd-help">Help</button>
            </div>
          </div>
        </section>

        <!-- Serial Monitor - Bento 2x1 -->
        <section class="bento-card bento-wide">
          <div class="card-header">
            <span class="card-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            </span>
            <h2 class="card-title">Console</h2>
            <button id="clearOutput" class="btn btn-ghost btn-sm" data-testid="clear-output">Clear</button>
          </div>
          <pre id="serialOutput" class="console" data-testid="serial-output"></pre>
        </section>

      </div>

      <!-- Dot matrix decoration -->
      <div class="dot-grid" aria-hidden="true"></div>

    </main>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="script.js"></script>
</body>
</html>
