<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <!-- Bodenplatte -->
  <rect x="40" y="176" width="120" height="10" rx="2" fill="#1a1a1a"/>
  <rect x="55" y="168" width="90" height="10" rx="2" fill="#333333"/>

  <!-- Drehsockel mit Schraubendetails -->
  <circle cx="100" cy="160" r="22" fill="#333333"/>
  <circle cx="100" cy="160" r="22" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="100" cy="160" r="14" fill="#4a4a4a"/>
  <circle cx="88" cy="150" r="2.2" fill="#1a1a1a"/>
  <circle cx="112" cy="150" r="2.2" fill="#1a1a1a"/>
  <circle cx="88" cy="170" r="2.2" fill="#1a1a1a"/>
  <circle cx="112" cy="170" r="2.2" fill="#1a1a1a"/>

  <!-- Basisgelenk -->
  <circle cx="100" cy="148" r="10" fill="#1a1a1a"/>
  <circle cx="100" cy="148" r="5" fill="#666666"/>

  <!-- Unterarm (Segment 1) mit Hydraulik-Detail -->
  <g transform="rotate(-22 100 148)">
    <rect x="93" y="90" width="14" height="58" rx="4" fill="#4a4a4a" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="96.5" y="96" width="7" height="46" fill="#2b2b2b"/>
    <line x1="93" y1="105" x2="107" y2="105" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="93" y1="132" x2="107" y2="132" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>

  <!-- Ellenbogengelenk -->
  <circle cx="88" cy="94" r="11" fill="#1a1a1a"/>
  <circle cx="88" cy="94" r="5.5" fill="#666666"/>

  <!-- Oberarm (Segment 2) -->
  <g transform="rotate(28 88 94)">
    <rect x="81" y="42" width="14" height="52" rx="4" fill="#4a4a4a" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="84.5" y="48" width="7" height="40" fill="#2b2b2b"/>
    <line x1="81" y1="56" x2="95" y2="56" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="81" y1="80" x2="95" y2="80" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>

  <!-- Handgelenk -->
  <circle cx="112" cy="46" r="9" fill="#1a1a1a"/>
  <circle cx="112" cy="46" r="4.5" fill="#666666"/>

  <!-- Kleines Verbindungssegment zum Greifer -->
  <rect x="108" y="24" width="8" height="20" rx="3" fill="#4a4a4a" stroke="#1a1a1a" stroke-width="2" transform="rotate(8 112 46)"/>

  <!-- Greiferbasis -->
  <rect x="98" y="16" width="28" height="10" rx="3" fill="#333333" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Greiferzangen -->
  <path d="M102 16 L96 2 L102 4 Z" fill="#333333" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/>
  <path d="M122 16 L128 2 L122 4 Z" fill="#333333" stroke="#1a1a1a" stroke-width="2" stroke-linejoin="round"/>

  <!-- Zangen-Zähne -->
  <line x1="99" y1="10" x2="103" y2="9" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="121" y1="10" x2="125" y2="9" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Statusleuchte am Handgelenk -->
  <circle cx="112" cy="46" r="2" fill="#e63946"/>

</svg>
